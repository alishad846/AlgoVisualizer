<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AlgoVision AI</title>

<link
rel="stylesheet"
href="styles.css">

</head>

<body>

<div class="header">

<h1>🤖 AlgoVision AI</h1>

<p class="subtitle">

AI Powered Algorithm Detection & Visualization

</p>

</div>

<div class="button-group">

<button id="analyzeBtn">

🔍 Analyze Current Problem

</button>

<button id="openVisualizer">

🚀 Open Visualizer

</button>

</div>

<div class="input-section">

<textarea

id="manualInput"

placeholder="Paste any coding problem, DSA question or ML problem here..."

></textarea>

<button id="manualBtn">

🧠 Analyze Manual Input

</button>

</div>

<div id="result">

<div class="result-card">

<h2>Ready</h2>

<p>

Open any LeetCode problem and click

<b>Analyze Current Problem</b>

</p>

</div>

</div>

<div class="footer">

<div>

AlgoVision AI Extension

</div>

<div>

Supports Sorting • Searching • Trees • Graphs • DP • ML

</div>

</div>

<script src="algorithms.js"></script>

<script src="popup.js"></script>

</body>

</html>
